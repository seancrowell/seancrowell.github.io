project:
  type: website
  output-dir: _site

website:
  # Give the site a clear, professional title that reflects the lab's work
  title: "Crowell Lab – Remote Sensing & Climate Research"
  site-url: "https://seancrowell.github.io"
  # A concise description shown in metadata and social previews
  description: "Advancing atmospheric remote sensing and carbon-cycle science through satellite data, inverse modelling and open tools."
  navbar:
    left:
      # Keep navigation intuitive: home, research, team, publications and contact
      - href: index.qmd
        text: Home
      - href: research/index.qmd
        text: Research
      - href: people/index.qmd
        text: Team
      - href: publications.qmd
        text: Publications
      - href: contact.qmd
        text: Contact
    right:
      # Replace GitHub placeholder with the user’s actual GitHub profile when known
      - icon: github
        href: https://github.com/seanmrcrowell
        aria-label: GitHub
  # enable search box in the header
  search: true
  # simple footer with copyright and accessibility link
  page-footer:
    left: "© {year} Crowell Lab"
    right:
      - text: "Accessibility"
        href: accessibility.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    smooth-scroll: true

execute:
  freeze: auto
